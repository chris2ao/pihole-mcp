name: Bug report
description: Report broken behavior in pihole-mcp
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include the tool name you called, its arguments, and the response.
      placeholder: |
        1. Call tool `get_query_log` with length=100
        2. Observe error ...
    validations:
      required: true
  - type: input
    id: pihole-version
    attributes:
      label: Pi-hole version
      placeholder: "6.1.4"
    validations:
      required: true
  - type: input
    id: mcp-version
    attributes:
      label: pihole-mcp version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.7"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or tracebacks
      render: shell
